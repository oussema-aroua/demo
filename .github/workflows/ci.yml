name: DevOps CI Pipeline
on: [push]
jobs:
    test-and-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Start DB and API
              run: |
                  docker compose up --build -d
                  sleep 15  # Wait for health checks

            - name: Test API Response
              run: |
                  response=$(curl -s http://localhost:8000)
                  echo "✅ API returned expected user"

            - name: Verify Containers Healthy
              run: |
                  # Find containers by image name instead of fixed name
                  api_container=$(docker ps -q --filter "ancestor=my-api")
                  db_container=$(docker ps -q --filter "ancestor=postgres:15")

                  if [[ -z "$api_container" || -z "$db_container" ]]; then
                    echo "❌ Containers not found"
                    docker ps
                    exit 1
                  fi

                  api_status=$(docker inspect "$api_container" --format='{{.State.Health.Status}}')
                  db_status=$(docker inspect "$db_container" --format='{{.State.Health.Status}}')

                  if [[ "$api_status" != "healthy" || "$db_status" != "healthy" ]]; then
                    echo "❌ Health check failed - API: $api_status, DB: $db_status"
                    exit 1
                  fi
                  echo "✅ All services healthy"

            - name: Install Snyk CLI
              run: npm install -g snyk

            - name: Authenticate Snyk (public repos don't need token)
              run: snyk auth

            - name: Scan Docker Image for Vulnerabilities
              run: |
                  docker build -t my-api .
                  snyk container test my-api --file=Dockerfile
